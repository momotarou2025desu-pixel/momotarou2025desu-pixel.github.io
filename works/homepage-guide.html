<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホームページ公開までの流れ | ChatGPTの達人</title>
  <meta name="description" content="GitHubでホームページを公開する最短手順を案内するページ">
  <meta property="og:title" content="ホームページ公開までの流れ | ChatGPTの達人">
  <meta property="og:description" content="GitHubでホームページを公開する最短手順を案内するページ">
  <meta name="twitter:title" content="ホームページ公開までの流れ | ChatGPTの達人">
  <meta name="twitter:description" content="GitHubでホームページを公開する最短手順を案内するページ">
  <style>
    :root {
      --bg: #f8f9fa;
      --card: #ffffff;
      --text: #202124;
      --muted: #5f6368;
      --line: #dadce0;
      --blue: #1a73e8;
      --blue-soft: #e8f0fe;
      --shadow: 0 10px 30px rgba(32, 33, 36, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Hiragino Sans", "Yu Gothic", sans-serif;
    }
    a { color: inherit; text-decoration: none; }
    .page {
      min-height: 100vh;
      padding: 28px 16px 64px;
    }
    .wrap {
      width: min(100%, 860px);
      margin: 0 auto;
    }
    .home-link {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 76px;
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.94);
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 700;
      box-shadow: 0 6px 18px rgba(0,0,0,.08);
      backdrop-filter: blur(10px);
      transition: background .15s ease, transform .15s ease, border-color .15s ease;
    }
    .home-link:hover {
      background: var(--blue-soft);
      border-color: var(--blue);
      transform: translateY(-1px);
    }
    .hero {
      display: grid;
      gap: 10px;
      justify-items: center;
      text-align: center;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 3.8vw, 2.8rem);
      line-height: 1.25;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px 24px;
    }
    .steps {
      margin: 0;
      padding-left: 1.6em;
      line-height: 1.9;
      font-size: 1rem;
    }
    .steps li {
      margin: 0 0 10px;
      padding: 0;
      border: none;
      background: transparent;
    }
    .num {
      display: none;
    }
    .actions {
      margin-top: 28px;
      display: grid;
      gap: 14px;
      justify-items: center;
    }
    .button {
      min-width: min(100%, 420px);
      padding: 18px 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #fff;
      color: var(--blue);
      text-align: center;
      font-size: clamp(1rem, 2.3vw, 1.25rem);
      font-weight: 700;
      box-shadow: 0 1px 2px rgba(0,0,0,.03);
      transition: background .15s ease, transform .15s ease, border-color .15s ease;
    }
    .button:hover {
      background: var(--blue-soft);
      border-color: var(--blue);
      transform: translateY(-1px);
    }
    @media (max-width: 560px) {
      .page { padding-top: 20px; }
      .card { padding: 22px 16px; border-radius: 22px; }
      .steps { padding-left: 1.4em; }
      .steps li { margin-bottom: 8px; }
      .home-link {
        top: 10px;
        right: 10px;
        min-width: 68px;
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>
  <a class="home-link" href="../index.html">Home</a>
  <main class="page">
    <div class="wrap">
      <section class="hero">
        <h1>ホームページ公開までの流れ</h1>
      </section>

      <section class="card">
        <ol class="steps">
          <li><span class="num">1</span><span>GitHubに登録してログイン</span></li>
          <li><span class="num">2</span><span>Create repositoryで保存場所を作る</span></li>
          <li><span class="num">3</span><span>Add file → Upload filesでホームページのHTMLを入れる</span></li>
          <li><span class="num">4</span><span>Commit changesで確定する</span></li>
          <li><span class="num">5</span><span>Settings → Pagesで公開URLを確認する</span></li>
          <li><span class="num">6</span><span>わからなければ、Alt+PrintScreenで今の画面をコピーして、AIさんにCtrl+Vで貼り付ける</span></li>
        </ol>

        <div class="actions">
          <a class="button" href="chatgpt-homepage-example.html">ChatGPTで公開実例</a>
          <a class="button" href="design-translation-example.html">デザイン、翻訳機能などの搭載実例</a>
          <a class="button" href="created-sample-01.html">作成された見本１</a>
          <a class="button" href="created-sample-02.html">作成された見本２</a>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
