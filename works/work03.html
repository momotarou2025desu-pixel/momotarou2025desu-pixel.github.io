<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品03</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --text: #202124;
      --muted: #5f6368;
      --line: #dadce0;
      --blue: #1a73e8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Hiragino Sans", "Yu Gothic", sans-serif;
    }
    .wrap {
      width: min(100% - 32px, 760px);
      margin: 0 auto;
      padding: 28px 0 56px;
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: .92rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 22px;
    }
    .tag {
      display: inline-flex;
      min-height: 34px;
      padding: 0 12px;
      align-items: center;
      border-radius: 999px;
      background: #e8f0fe;
      color: var(--blue);
      font-weight: 700;
      font-size: .92rem;
    }
    h1 {
      margin: 14px 0 12px;
      font-size: clamp(1.5rem, 3vw, 2rem);
      line-height: 1.35;
      font-weight: 700;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="../index.html">← 戻る</a>
    <section class="card">
      <span class="tag">作品03</span>
      <h1>作品03</h1>
      <p>ここに作品03の内容を入れます。見た目はシンプルなままにしてあります。</p>
    </section>
  </div>
</body>
</html>
