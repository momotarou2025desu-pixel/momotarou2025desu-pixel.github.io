<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>指示の言葉集</title>
  <meta name="description" content="指示の言葉集">
  <style>
    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --text: #202124;
      --muted: #5f6368;
      --line: #dadce0;
      --blue: #1a73e8;
      --blue-soft: #e8f0fe;
      --danger: #b3261e;
      --danger-soft: #fce8e6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Hiragino Sans", "Yu Gothic", sans-serif;
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    button {
      font: inherit;
    }
    .wrap {
      width: min(100% - 28px, 860px);
      margin: 0 auto;
      padding: 18px 0 36px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: .92rem;
      min-height: 36px;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .tool-btn {
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid #c7d7ef;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue);
      cursor: pointer;
      font-weight: 700;
    }
    .tool-btn.ghost {
      background: #fff;
      border-color: var(--line);
      color: var(--muted);
      font-weight: 600;
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.45rem, 3vw, 1.95rem);
      font-weight: 700;
      line-height: 1.25;
    }
    .list {
      display: grid;
      gap: 10px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .title-input {
      min-width: 0;
      flex: 1 1 260px;
      border: 0;
      outline: none;
      background: transparent;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
      padding: 0;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .action-btn {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid #c7d7ef;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue);
      cursor: pointer;
      font-weight: 700;
      font-size: .92rem;
    }
    .action-btn.danger {
      border-color: #efc7c4;
      background: var(--danger-soft);
      color: var(--danger);
    }
    .phrase-input {
      width: 100%;
      min-height: 68px;
      resize: vertical;
      margin: 0;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f1f3f4;
      border: 1px solid #eceff1;
      line-height: 1.7;
      font-size: .97rem;
      color: var(--text);
      outline: none;
    }
    .phrase-input:focus,
    .title-input:focus {
      box-shadow: 0 0 0 2px rgba(26,115,232,.12);
    }
    .status {
      margin-top: 12px;
      color: var(--muted);
      font-size: .9rem;
      min-height: 1.4em;
    }
    @media (max-width: 560px) {
      .wrap {
        width: min(100% - 20px, 860px);
        padding-top: 14px;
      }
      .card {
        padding: 12px;
      }
      .toolbar,
      .actions {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" href="index.html">← 戻る</a>
      <div class="toolbar">
        <button class="tool-btn ghost" id="resetLocalBtn" type="button">保存を初期化</button>
        <button class="tool-btn" id="addBtn" type="button">項目を追加</button>
        <button class="tool-btn" id="exportBtn" type="button">HTMLを書き出し</button>
      </div>
    </div>

    <h1>指示の言葉集</h1>

    <section class="list" id="list"></section>
    <div class="status" id="status"></div>
  </div>

  <template id="cardTemplate">
    <article class="card">
      <div class="card-head">
        <input class="title-input" type="text" value="">
        <div class="actions">
          <button class="action-btn" type="button" data-action="copy">コピー</button>
          <button class="action-btn" type="button" data-action="up">↑</button>
          <button class="action-btn" type="button" data-action="down">↓</button>
          <button class="action-btn danger" type="button" data-action="delete">削除</button>
        </div>
      </div>
      <textarea class="phrase-input"></textarea>
    </article>
  </template>

  <script>
    const defaultItems = [
      { title: "HTMLを作成", phrase: "この内容でHTMLを作成して" },
      { title: "最新ファイルを修正", phrase: "この最新ファイルを土台にして修正して" },
      { title: "見た目だけ直す", phrase: "機能は変えずに、見た目だけ直して" },
      { title: "一番シンプルで作る", phrase: "一番シンプルな形で作成して" },
      { title: "原因だけ調べる", phrase: "長く広く調べず、原因をピンポイントで特定して" }
    ];

    const STORAGE_KEY = "shiji_editor_items_v1";
    const listEl = document.getElementById("list");
    const template = document.getElementById("cardTemplate");
    const statusEl = document.getElementById("status");
    const addBtn = document.getElementById("addBtn");
    const exportBtn = document.getElementById("exportBtn");
    const resetLocalBtn = document.getElementById("resetLocalBtn");

    let items = loadItems();

    function cloneDefaults() {
      return JSON.parse(JSON.stringify(defaultItems));
    }

    function loadItems() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return cloneDefaults();
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed) || parsed.length === 0) return cloneDefaults();
        return parsed.map(item => ({
          title: typeof item.title === "string" ? item.title : "",
          phrase: typeof item.phrase === "string" ? item.phrase : ""
        }));
      } catch (e) {
        return cloneDefaults();
      }
    }

    function saveItems(message = "保存しました") {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      setStatus(message);
    }

    function setStatus(message) {
      statusEl.textContent = message;
      clearTimeout(setStatus.timer);
      setStatus.timer = setTimeout(() => {
        if (statusEl.textContent === message) statusEl.textContent = "";
      }, 1600);
    }

    function render() {
      listEl.innerHTML = "";
      items.forEach((item, index) => {
        const node = template.content.firstElementChild.cloneNode(true);
        const titleInput = node.querySelector(".title-input");
        const phraseInput = node.querySelector(".phrase-input");

        titleInput.value = item.title;
        phraseInput.value = item.phrase;

        titleInput.addEventListener("input", () => {
          items[index].title = titleInput.value;
          saveItems();
        });

        phraseInput.addEventListener("input", () => {
          items[index].phrase = phraseInput.value;
          saveItems();
        });

        node.querySelector('[data-action="copy"]').addEventListener("click", async () => {
          try {
            await navigator.clipboard.writeText((phraseInput.value || "").trim());
            setStatus("コピーしました");
          } catch (e) {
            setStatus("コピーに失敗しました");
          }
        });

        node.querySelector('[data-action="up"]').addEventListener("click", () => {
          if (index === 0) return;
          const tmp = items[index - 1];
          items[index - 1] = items[index];
          items[index] = tmp;
          saveItems("並びを保存しました");
          render();
        });

        node.querySelector('[data-action="down"]').addEventListener("click", () => {
          if (index >= items.length - 1) return;
          const tmp = items[index + 1];
          items[index + 1] = items[index];
          items[index] = tmp;
          saveItems("並びを保存しました");
          render();
        });

        node.querySelector('[data-action="delete"]').addEventListener("click", () => {
          items.splice(index, 1);
          if (items.length === 0) items.push({ title: "新しい項目", phrase: "" });
          saveItems("削除しました");
          render();
        });

        listEl.appendChild(node);
      });
    }

    addBtn.addEventListener("click", () => {
      items.push({ title: "新しい項目", phrase: "" });
      saveItems("追加しました");
      render();
    });

    resetLocalBtn.addEventListener("click", () => {
      items = cloneDefaults();
      localStorage.removeItem(STORAGE_KEY);
      render();
      setStatus("初期状態に戻しました");
    });

    exportBtn.addEventListener("click", () => {
      const dataScript = "const defaultItems = " + JSON.stringify(items, null, 2) + ";";
      const exportHtml = document.documentElement.outerHTML.replace(
        /const defaultItems = \[[\s\S]*?\];/,
        dataScript
      );
      const blob = new Blob([exportHtml], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "shiji.html";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setStatus("shiji.html を書き出しました");
    });

    render();
  </script>
</body>
</html>
