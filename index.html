<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPTの達人</title>
  <meta name="description" content="ChatGPTの力を検証・公開するサイト">
  <style>
    :root {
      --bg: #f8f9fa;
      --text: #202124;
      --muted: #5f6368;
      --line: #dadce0;
      --soft: #f1f3f4;
      --blue: #1a73e8;
      --blue-soft: #e8f0fe;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Hiragino Sans", "Yu Gothic", sans-serif;
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    img {
      display: block;
      max-width: 100%;
    }
    .page {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px 56px;
    }
    .wrap {
      width: min(100%, 980px);
      margin: 0 auto;
    }
    .hero {
      display: grid;
      gap: 34px;
      justify-items: center;
      text-align: center;
    }
    .brand-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
      flex-wrap: nowrap;
    }
    .main-icon {
      width: 132px;
      height: 132px;
      object-fit: contain;
    }
    .headline-wrap {
      text-align: center;
      max-width: none;
    }
    .headline {
      margin: 0;
      font-size: clamp(1.7rem, 3.2vw, 2.6rem);
      font-weight: 700;
      line-height: 1.25;
      white-space: nowrap;
    }
        .entry-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 18px;
      justify-items: center;
    }
    .entry-card {
      width: 100%;
      max-width: 132px;
      display: grid;
      gap: 10px;
      justify-items: center;
      text-align: center;
    }
    .entry-icon {
      width: 84px;
      height: 84px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: var(--soft);
      border: 1px solid #d5d7da;
      color: var(--blue);
      font-size: 1.18rem;
      font-weight: 700;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
    }
    .entry-card:hover .entry-icon {
      transform: translateY(-2px);
      border-color: var(--blue);
      background: var(--blue-soft);
    }
    .entry-label {
      font-size: .95rem;
      color: var(--text);
      line-height: 1.4;
      word-break: keep-all;
    }
    .note {
      margin-top: 6px;
      color: var(--muted);
      font-size: .92rem;
      line-height: 1.65;
    }
    @media (max-width: 900px) {
      .brand-row {
        flex-direction: column;
        gap: 14px;
      }
      .entry-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .headline-wrap {
        text-align: center;
        max-width: none;
      }
      .headline {
        font-size: clamp(1.35rem, 5vw, 2.1rem);
        white-space: nowrap;
      }
    }
    @media (max-width: 560px) {
      .page {
        padding-top: 28px;
      }
      .brand-row {
        gap: 14px;
      }
      .main-icon {
        width: 108px;
        height: 108px;
      }
      .entry-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px 10px;
      }
      .entry-card {
        max-width: 100%;
      }
    }

    .entry-card.sample .entry-icon {
      background: #ffffff;
      border: 1px solid #c7d7ef;
      padding: 0;
      overflow: hidden;
    }
    .entry-card.sample .entry-label {
      font-weight: 700;
    }
    .word-icon {
      width: 84px;
      height: 84px;
      display: block;
    }

  </style>
</head>
