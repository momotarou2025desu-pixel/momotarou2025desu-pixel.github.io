<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>完全無料ホームページ作成</title>
  <meta name="description" content="完全無料ホームページ作成">
  <style>
    :root {
      --bg: #f8f9fa;
      --text: #202124;
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Hiragino Sans", "Yu Gothic", sans-serif;
      display: grid;
      place-items: center;
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <h1>完全無料ホームページ作成</h1>
</body>
</html>
