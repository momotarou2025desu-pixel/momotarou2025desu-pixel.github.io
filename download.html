<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配布ファイル</title>
  <meta name="description" content="配布ファイル">
  <style>
    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --text: #202124;
      --muted: #5f6368;
      --line: #dadce0;
      --blue: #1a73e8;
      --blue-soft: #e8f0fe;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Hiragino Sans", "Yu Gothic", sans-serif;
    }
    a { color: inherit; text-decoration: none; }
    .wrap {
      width: min(100% - 28px, 920px);
      margin: 0 auto;
      padding: 18px 0 36px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: .92rem;
      min-height: 36px;
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.45rem, 3vw, 1.95rem);
      font-weight: 700;
      line-height: 1.25;
    }
    .list {
      display: grid;
      gap: 10px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }
    .preview {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .preview-text {
      min-width: 0;
      display: grid;
      gap: 4px;
    }
    .preview-title {
      font-weight: 700;
      line-height: 1.5;
      word-break: break-word;
    }
    .preview-desc {
      color: var(--muted);
      font-size: .94rem;
      line-height: 1.6;
      word-break: break-word;
    }
    .download-link {
      min-height: 38px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 700;
      border: 1px solid #c7d7ef;
      white-space: nowrap;
    }
    @media (max-width: 560px) {
      .wrap {
        width: min(100% - 20px, 920px);
        padding-top: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="back" href="index.html">← 戻る</a>
    </div>
    <h1>配布ファイル</h1>
    <section class="list">
      
    </section>
  </div>
</body>
</html>
